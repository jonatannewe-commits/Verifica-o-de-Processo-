<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Qualidade Têxtil</title>
    <style>
        :root {
            --primary-dark: #2c3e50;
            --accent-blue: #34495e;
            --success-green: #27ae60;
            --danger-red: #e74c3c;
            --bg-gray: #f4f7f6;
            --text-main: #333;
            --white: #ffffff;
            --warning-orange: #f39c12;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; background-color: var(--bg-gray); color: var(--text-main); }
        
        #status-conexao { text-align: center; padding: 8px; font-size: 12px; font-weight: bold; color: white; transition: 0.3s; position: sticky; top: 0; z-index: 1000; }
        .online { background-color: var(--success-green); }
        .offline { background-color: var(--danger-red); }

        .container { max-width: 500px; margin: 10px auto; background: var(--white); padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        
        h2 { text-align: center; color: var(--primary-dark); font-weight: 700; margin-bottom: 5px; }
        .header-line { height: 4px; width: 40px; background: var(--primary-dark); margin: 0 auto 20px; border-radius: 2px; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .dash-card { background: #f8f9fa; border: 1px solid #e9ecef; padding: 15px; border-radius: 10px; text-align: center; }
        .dash-card.full { grid-column: span 2; border-bottom: 3px solid var(--primary-dark); }
        .dash-card h4 { margin: 0; font-size: 11px; color: #7f8c8d; text-transform: uppercase; }
        .dash-card p { margin: 5px 0 0; font-size: 22px; font-weight: bold; color: var(--primary-dark); }
        
        .menu-btn { width: 100%; padding: 16px; margin: 8px 0; font-size: 15px; font-weight: 600; cursor: pointer; border: none; border-radius: 8px; background-color: var(--primary-dark); color: white; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .menu-btn:hover { background-color: #1a252f; transform: translateY(-1px); }

        .hidden { display: none; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 12px; color: #555; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 6px; border: 1.5px solid #dce1e5; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        
        input[type="file"] { background: #f8f9fa; padding: 10px; border: 2px dashed #bdc3c7; }

        .btn-save { background-color: var(--success-green); color: white; border: none; margin-top: 25px; padding: 16px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-back { background-color: transparent; color: #7f8c8d; border: 1px solid #bdc3c7; margin-top: 10px; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: 600; }

        .card { background: var(--white); padding: 15px; border: 1px solid #e1e8ed; margin-bottom: 10px; border-radius: 8px; font-size: 14px; }
        .rascunho-tag { background: var(--warning-orange); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-bottom: 5px; display: inline-block; }
        .status-badge { float: right; padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .status-conforme { background: #e8f5e9; color: #2e7d32; }
        .status-nc { background: #ffebee; color: #c62828; }
        .sector-tag { background: #eee; padding: 2px 6px; border-radius: 4px; font-size: 10px; color: #666; }
        .img-preview { width: 100%; margin-top: 10px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; }
    </style>
</head>
<body>

<div id="status-conexao" class="online">CONECTADO AO SISTEMA</div>

<div class="container">
    <div id="home">
        <h2>QUALIDADE</h2>
        <div class="header-line"></div>
        <div class="dashboard">
            <div class="dash-card full"><h4>Total de Inspeções</h4><p id="stat-total">-</p></div>
            <div class="dash-card"><h4>Conformidade</h4><p id="stat-perc" style="color:var(--success-green)">-%</p></div>
            <div class="dash-card"><h4>Não Conformes</h4><p id="stat-nc" style="color:var(--danger-red)">-</p></div>
        </div>
        <button class="menu-btn" onclick="showScreen('selecao-setor')"><span>📝</span> Registrar Verificação</button>
        <button class="menu-btn" style="background-color: var(--accent-blue);" onclick="listarDados('tudo')"><span>📋</span> Histórico de Processo</button>
        <button class="menu-btn" style="background-color: var(--warning-orange);" onclick="listarDados('rascunhos')"><span>⏳</span> Rascunhos Pendentes (<span id="count-rascunhos">0</span>)</button>
    </div>

    <div id="selecao-setor" class="hidden">
        <h2>Escolha o Setor</h2>
        <div class="header-line"></div>
        <button class="menu-btn" onclick="abrirFormulario('Tecelagem')">🧵 Verificação Tecelagem</button>
        <button class="menu-btn" onclick="abrirFormulario('Tratamento Têxtil')">🧪 Verificação Tratamento Têxtil</button>
        <button class="btn-back" onclick="showScreen('home')">VOLTAR</button>
    </div>

    <div id="form-inspecao" class="hidden">
        <h2 id="titulo-form">Nova Inspeção</h2>
        <div class="header-line"></div>
        <form id="inspectionForm">
            <input type="hidden" id="setor_atual">
            
            <label>Inspetor Responsável</label>
            <input type="text" id="inspetor" placeholder="Nome" required>
            
            <div id="container-tecelagem" class="hidden">
                <label>Unidade de Tecelagem</label>
                <select id="unidade_tecelagem" onchange="atualizarMaquinas()">
                    <option value="">Selecione a Unidade</option>
                    <option value="Tecelagem 1">Tecelagem 1</option>
                    <option value="Tecelagem 2">Tecelagem 2</option>
                    <option value="Tecelagem 3">Tecelagem 3</option>
                </select>
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Máquina</label>
                    <select id="maquina" required><option value="">Aguardando...</option></select>
                </div>
                <div style="flex: 1;"><label>Artigo</label><input type="text" id="artigo" required></div>
            </div>

            <label>Turno</label>
            <select id="turno"><option value="A">Turno A</option><option value="B">Turno B</option><option value="C">Turno C</option></select>

            <label>Resultado</label>
            <select id="status" onchange="toggleFields()">
                <option value="conforme">✅ CONFORME</option>
                <option value="nao-conforme">❌ NÃO CONFORME</option>
            </select>

            <div id="div-conforme">
                <label>Qtd Inspecionada</label>
                <input type="number" id="qtd_conforme">
            </div>

            <div id="div-nao-conforme" class="hidden">
                <label>Defeito</label>
                <textarea id="nc_descricao" rows="2"></textarea>
                <label>Qtd NC</label>
                <input type="number" id="qtd_nc">
                <label style="color: var(--danger-red);">📸 Foto do Defeito</label>
                <input type="file" id="foto_nc" accept="image/*" capture="environment">
            </div>

            <button type="button" class="btn-save" id="btnSalvar">FINALIZAR REGISTRO</button>
            <button type="button" class="btn-back" onclick="showScreen('selecao-setor')">VOLTAR</button>
        </form>
    </div>

    <div id="lista-inspecoes" class="hidden">
        <h2 id="titulo-lista">Histórico</h2>
        <div class="header-line"></div>
        <div id="cards-container">Carregando...</div>
        <button type="button" class="btn-back" onclick="showScreen('home')">VOLTAR AO MENU</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, getDocs, query, orderBy, enableIndexedDbPersistence 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCybv0o7mXVrtNpf_CTLK4hHBot23xAr_U",
        authDomain: "app-inspecao-56bc1.firebaseapp.com",
        projectId: "app-inspecao-56bc1",
        storageBucket: "app-inspecao-56bc1.firebasestorage.app",
        messagingSenderId: "183990054420",
        appId: "1:183990054420:web:8d3295ade34778ae010101",
        measurementId: "G-0S17CVPESK"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    enableIndexedDbPersistence(db).catch(err => console.error("Persistência:", err.code));

    const statusDiv = document.getElementById('status-conexao');
    const btnSalvar = document.getElementById('btnSalvar');

    function atualizarInterfaceConexao() {
        const isOnline = navigator.onLine;
        statusDiv.innerText = isOnline ? "CONECTADO AO SISTEMA" : "MODO OFFLINE - SALVANDO RASCUNHO";
        statusDiv.className = isOnline ? "online" : "offline";
        if(document.getElementById('home').classList.contains('hidden') === false) carregarDashboard();
    }
    window.addEventListener('online', atualizarInterfaceConexao);
    window.addEventListener('offline', atualizarInterfaceConexao);

    const maquinasPorTecelagem = {
        "Tecelagem 1": ["Sg-01", "Sg-02", "Sg-03"],
        "Tecelagem 2": ["TJ-01", "DNR-25", "FJ-15"],
        "Tecelagem 3": ["Picanol-01", "Picanol-02"]
    };

    window.atualizarMaquinas = () => {
        const unidade = document.getElementById('unidade_tecelagem').value;
        const select = document.getElementById('maquina');
        select.innerHTML = '<option value="">Selecione...</option>';
        if (maquinasPorTecelagem[unidade]) {
            maquinasPorTecelagem[unidade].forEach(maq => {
                let opt = document.createElement('option'); opt.value = maq; opt.innerText = maq; select.appendChild(opt);
            });
        }
    };

    window.abrirFormulario = (setor) => {
        document.getElementById('setor_atual').value = setor;
        document.getElementById('titulo-form').innerText = setor;
        document.getElementById('container-tecelagem').classList.toggle('hidden', setor !== 'Tecelagem');
        document.getElementById('maquina').innerHTML = setor === 'Tecelagem' ? '<option value="">Aguardando...</option>' : '<option value="Industrial-01">Industrial-01</option>';
        showScreen('form-inspecao');
    };

    async function processarImagem(arquivo) {
        return new Promise(resolve => {
            const reader = new FileReader(); reader.readAsDataURL(arquivo);
            reader.onload = e => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const MAX = 800;
                    let w = img.width, h = img.height;
                    if (w > MAX) { h *= MAX / w; w = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        });
    }

    async function salvarNoFirebase() {
        const f = document.getElementById('inspectionForm');
        const status = document.getElementById('status').value;
        const fotoFile = document.getElementById('foto_nc').files[0];
        if(!document.getElementById('inspetor').value || !document.getElementById('maquina').value) return alert("Campos obrigatórios!");
        if(status === 'nao-conforme' && !fotoFile) return alert("Foto obrigatória!");

        btnSalvar.disabled = true; btnSalvar.innerText = "PROCESSANDO...";
        try {
            const payload = {
                setor: document.getElementById('setor_atual').value,
                unidade: document.getElementById('unidade_tecelagem').value || "N/A",
                inspetor: document.getElementById('inspetor').value,
                turno: document.getElementById('turno').value,
                maquina: document.getElementById('maquina').value,
                artigo: document.getElementById('artigo').value,
                status: status,
                data: new Date().toLocaleString('pt-BR'),
                timestamp: new Date(),
                fotoData: fotoFile ? await processarImagem(fotoFile) : null
            };
            if(status === 'conforme') payload.quantidade = document.getElementById('qtd_conforme').value;
            else { payload.nao_conformidade = document.getElementById('nc_descricao').value; payload.quantidade_nc = document.getElementById('qtd_nc').value; }

            await addDoc(collection(db, "inspecoes"), payload);
            alert(navigator.onLine ? "Sucesso!" : "Salvo como rascunho!");
            location.reload();
        } catch (e) { alert(e.message); btnSalvar.disabled = false; }
    }

    async function carregarDashboard() {
        const snap = await getDocs(collection(db, "inspecoes"));
        let total = 0, ncs = 0, rascunhos = 0;
        snap.forEach(doc => { 
            total++; 
            if(doc.data().status === 'nao-conforme') ncs++; 
            if(doc.metadata.hasPendingWrites) rascunhos++;
        });
        document.getElementById('stat-total').innerText = total;
        document.getElementById('stat-perc').innerText = total > 0 ? (((total-ncs)/total)*100).toFixed(1)+"%" : "0%";
        document.getElementById('stat-nc').innerText = ncs;
        document.getElementById('count-rascunhos').innerText = rascunhos;
    }

    async function listarDados(tipo) {
        showScreen('lista-inspecoes');
        const container = document.getElementById('cards-container');
        document.getElementById('titulo-lista').innerText = tipo === 'rascunhos' ? "Rascunhos Pendentes" : "Histórico";
        container.innerHTML = "Buscando...";
        
        const snap = await getDocs(query(collection(db, "inspecoes"), orderBy("timestamp", "desc")));
        container.innerHTML = "";
        let encontrou = false;

        snap.forEach(doc => {
            const item = doc.data();
            const ehRascunho = doc.metadata.hasPendingWrites;
            if(tipo === 'rascunhos' && !ehRascunho) return; 
            
            encontrou = true;
            const badge = item.status === 'nao-conforme' ? 'status-nc' : 'status-conforme';
            container.innerHTML += `
                <div class="card" style="${ehRascunho ? 'border-left: 5px solid var(--warning-orange)' : ''}">
                    ${ehRascunho ? '<span class="rascunho-tag">⏳ PENDENTE DE SINCRONIZAÇÃO</span>' : ''}
                    <span class="status-badge ${badge}">${item.status}</span>
                    <span class="sector-tag">${item.unidade !== "N/A" ? item.unidade : item.setor}</span><br>
                    <strong>${item.artigo}</strong> | Mq: ${item.maquina} <br>
                    ${item.fotoData ? `<img src="${item.fotoData}" class="img-preview" onclick="window.open().document.write('<img src=\\'${item.fotoData}\\' style=\\'width:100%\\'>')">` : ''}
                    <div style="margin-top:8px; font-size:11px; color:#999">${item.data}</div>
                </div>`;
        });
        if(!encontrou) container.innerHTML = tipo === 'rascunhos' ? "<p style='text-align:center'>Nenhum rascunho pendente.</p>" : "Nenhum registro.";
    }

    window.showScreen = (id) => {
        document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'home') carregarDashboard();
    };

    window.toggleFields = () => {
        const s = document.getElementById('status').value;
        document.getElementById('div-conforme').classList.toggle('hidden', s !== 'conforme');
        document.getElementById('div-nao-conforme').classList.toggle('hidden', s !== 'nao-conforme');
    };

    document.getElementById('btnSalvar').addEventListener('click', salvarNoFirebase);
    window.listarDados = listarDados;
    atualizarInterfaceConexao();
    carregarDashboard();
</script>
</body>
</html>
